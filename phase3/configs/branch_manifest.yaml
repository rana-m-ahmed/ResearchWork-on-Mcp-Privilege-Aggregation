branches:
  - branch_name: phase3-model-1
    source_freeze_commit: "phase3-source-freeze-v1"
    model_slot: M1
    allowed_editable_files:
      - "phase3/configs/model_1.yaml"
      - "phase3/runs/M1/*"
      - "phase3/reports/phase3_model_1_competence_report.md"
      - "phase3/validation/model_1_*.md"
    disallowed_source_drift: "Any changes to common source files outside of allowed_editable_files"
    run_directory: "phase3/runs/M1/"
    report_path: "phase3/reports/phase3_model_1_competence_report.md"
    completion_tag: "phase3-model-1-complete"

