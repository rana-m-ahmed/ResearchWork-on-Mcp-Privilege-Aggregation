deliverables:
  - deterministic contiguous batch partitioner
  - immutable batch partition manifest
  - pending/accepted/orphan resume resolver
  - Kaggle run planner CLI and schemas
  - batch partition manifest outputs
  - Kaggle run plan JSON and Markdown outputs
  - P05 task packet and implementation report
  - positive, negative, invariant, and fault-path tests
required_tests:
  - partition preserves all rows exactly once
  - same input produces identical manifest
  - no queue mixing
  - changed partition after freeze rejected
  - accepted target not selected
  - orphan receives next attempt index
  - divergent checkpoint histories fail
  - timing formula unit tests
  - zero or invalid timing data fails closed
  - scenario tests for one and multiple sessions per model
acceptance_criteria:
  - Partition manifest covers exactly 10,200 frozen targets.
  - Resume is idempotent and duplicate-safe.
  - Run planner consumes real Phase 4.5 evidence.
  - No outcome field influences planning.
commit_message: phase5(P05): add deterministic batches resume and run planner
notes:
  - The task is operational and must not rebalance the scientific queue order or invent missing frozen values.
  - Phase 4 and Phase 4.5 artifacts remain read-only.
