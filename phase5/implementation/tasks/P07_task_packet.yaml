acceptance_criteria:
  - FastMCP is bound only to 127.0.0.1.
  - Reset stays hidden from discovery and non-dispatchable through MCP.
  - Reset failure triggers restart fallback and quarantines on repeated failure.
  - Per-attempt workspace writes stay inside approved evidence/mock roots.
  - Phase 4 and Phase 4.5 artifacts remain unmodified.
