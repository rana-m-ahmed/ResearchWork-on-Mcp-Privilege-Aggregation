name: phase5-freeze-guard

on:
  push:
    paths:
      - "phase4/**"
      - "phase4_5/**"
      - "phase5/scripts/check_phase5_frozen_paths.py"
      - ".github/workflows/phase5-freeze-guard.yml"
  pull_request:
    paths:
      - "phase4/**"
      - "phase4_5/**"
      - "phase5/scripts/check_phase5_frozen_paths.py"
      - ".github/workflows/phase5-freeze-guard.yml"

jobs:
  freeze_guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Freeze guard positive path
        run: python phase5/scripts/check_phase5_frozen_paths.py --changed phase5/implementation/reports/P01_implementation_report.md
      - name: Freeze guard negative fixture
        run: python phase5/scripts/check_phase5_frozen_paths.py --changed phase4/configs/phase5_schema_freeze.json

